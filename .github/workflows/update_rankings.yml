name: Update App Rankings

on:
  schedule:
    - cron: '23 2 1 * 1'
  workflow_dispatch:
    inputs:
      skip_existing:
        description: 'Reuse files already committed by an earlier run'
        required: false
        type: boolean
        default: false
      generate_markdown:
        description: 'Generate Markdown summaries alongside ranking files'
        required: false
        type: boolean
        default: false
      limit:
        description: 'Maximum results requested from each RSS feed'
        required: false
        type: number
        default: 100
      countries:
        description: 'Country codes separated by commas or spaces; leave empty for all'
        required: false
        type: string
        default: ''

concurrency:
  group: update-rankings
  cancel-in-progress: false

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SELECTED_COUNTRIES: ${{ inputs.countries || '' }}

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare archive date and Git identity
        shell: bash
        run: |
          echo "ARCHIVE_DATE=$(date -u +'%Y%m01')" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage 1 - Download ranking RSS
        shell: bash
        run: |
          args=(rank --date "$ARCHIVE_DATE" --limit "${{ inputs.limit || 100 }}")
          if [[ "${{ inputs.skip_existing }}" == "true" ]]; then
            args+=(--skip-existing)
          fi
          if [[ -n "$SELECTED_COUNTRIES" ]]; then
            args+=(--countries "$SELECTED_COUNTRIES")
          fi
          node scripts/downloader.mjs "${args[@]}"

      - name: Stage 1 - Commit ranking checkpoint
        shell: bash
        run: |
          git add -- "rankings/$ARCHIVE_DATE"
          if ! git diff --cached --quiet; then
            git commit -m "Archive ranking RSS $ARCHIVE_DATE"
            git push
          else
            echo "No ranking RSS changes to commit."
          fi

      - name: Stage 2 - Download detail JSON and update curated lists
        shell: bash
        run: |
          args=(details --date "$ARCHIVE_DATE")
          if [[ "${{ inputs.skip_existing }}" == "true" ]]; then
            args+=(--skip-existing)
          fi
          if [[ -n "$SELECTED_COUNTRIES" ]]; then
            args+=(--countries "$SELECTED_COUNTRIES")
          fi
          node scripts/downloader.mjs "${args[@]}"

          # Backfill metadata for curated lists using the downloaded details
          lists_args=(lists)
          if [[ "${{ inputs.skip_existing }}" == "true" ]]; then
            lists_args+=(--skip-existing)
          fi
          if [[ -n "$SELECTED_COUNTRIES" ]]; then
            lists_args+=(--countries "$SELECTED_COUNTRIES")
          fi
          node scripts/downloader.mjs "${lists_args[@]}"

      - name: Stage 2 - Commit details and curated lists checkpoint
        shell: bash
        run: |
          git add -- details rankings/24010101
          if ! git diff --cached --quiet; then
            git commit -m "Update ranking details and curated lists metadata $ARCHIVE_DATE"
            git push
          else
            echo "No detail or curated lists changes to commit."
          fi

      - name: Stage 3 - Download media and publish index
        shell: bash
        run: |
          args=(media --date "$ARCHIVE_DATE")
          if [[ "${{ inputs.generate_markdown }}" == "true" ]]; then
            args+=(--generate-markdown)
          fi
          if [[ "${{ inputs.skip_existing }}" == "true" ]]; then
            args+=(--skip-existing)
          fi
          if [[ -n "$SELECTED_COUNTRIES" ]]; then
            args+=(--countries "$SELECTED_COUNTRIES")
          fi
          node scripts/downloader.mjs "${args[@]}"

      - name: Stage 3 - Commit completed archive and deploy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -- logos rankings rankings.json
          if ! git diff --cached --quiet; then
            git commit -m "Complete ranking archive $ARCHIVE_DATE"
            git push
          else
            echo "No media or index changes to commit."
          fi

          echo "Triggering static content deployment..."
          gh workflow run static.yml
