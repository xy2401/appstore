name: Update App Rankings

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      generate_markdown:
        description: 'Generate Markdown files'
        required: false
        type: boolean
        default: false
      skip_existing:
        description: 'Reuse cached details and artwork'
        required: false
        type: boolean
        default: false
      limit:
        description: 'Maximum results requested from each feed'
        required: false
        type: number
        default: 100
      concurrency:
        description: 'Concurrent detail and artwork requests'
        required: false
        type: number
        default: 4

concurrency:
  group: update-rankings
  cancel-in-progress: false

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Test downloader
        run: node --test scripts/downloader.test.mjs

      - name: Download rankings
        shell: bash
        run: |
          args=(--limit "${{ inputs.limit || 100 }}" --concurrency "${{ inputs.concurrency || 4 }}")

          if [[ "${{ inputs.skip_existing }}" == "true" ]]; then
            args+=(--skip-existing)
          fi

          if [[ "${{ inputs.generate_markdown }}" == "true" ]]; then
            args+=(--generate-markdown)
          fi

          node scripts/downloader.mjs "${args[@]}"

      - name: Commit and push changes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- rankings.json rankings details logos

          if git diff --cached --quiet; then
            echo "No ranking changes to commit."
            exit 0
          fi

          git commit -m "Update app rankings $(date -u +'%Y-%m-%d')"
          git push

          echo "Triggering static content deployment..."
          gh workflow run static.yml
