<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>App Store Rankings</title>
    <script>
        (() => {
            let theme = null;
            try {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light' || savedTheme === 'dark') theme = savedTheme;
            } catch {
                // Storage can be unavailable in privacy-restricted contexts.
            }
            document.documentElement.dataset.theme = theme
                || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        })();
    </script>
    <link rel="stylesheet" href="style.css?v=20260720-5">
</head>
<body>
    <svg class="svg-sprite" aria-hidden="true" focusable="false">
        <symbol id="media-icon-apps" viewBox="0 0 24 24">
            <rect x="3.5" y="3.5" width="7" height="7" rx="2.25"></rect>
            <rect x="13.5" y="3.5" width="7" height="7" rx="2.25"></rect>
            <rect x="3.5" y="13.5" width="7" height="7" rx="2.25"></rect>
            <rect x="13.5" y="13.5" width="7" height="7" rx="2.25"></rect>
        </symbol>
        <symbol id="media-icon-music" viewBox="0 0 24 24">
            <path d="M9 17.5V6.25L20 4v11.5"></path>
            <path d="M9 9.5l11-2.25"></path>
            <ellipse cx="6.5" cy="17.75" rx="2.5" ry="2"></ellipse>
            <ellipse cx="17.5" cy="15.75" rx="2.5" ry="2"></ellipse>
        </symbol>
        <symbol id="media-icon-podcasts" viewBox="0 0 24 24">
            <circle cx="12" cy="9.5" r="1.75"></circle>
            <path d="M8.75 13.75a4.5 4.5 0 1 1 6.5 0"></path>
            <path d="M6 16.75a8.25 8.25 0 1 1 12 0"></path>
            <path d="M10.25 14.75h3.5l.85 6.25H9.4z"></path>
        </symbol>
        <symbol id="media-icon-books" viewBox="0 0 24 24">
            <path d="M3.5 4.5h5.25A3.25 3.25 0 0 1 12 7.75V20a4.25 4.25 0 0 0-4.25-3.5H3.5z"></path>
            <path d="M20.5 4.5h-5.25A3.25 3.25 0 0 0 12 7.75V20a4.25 4.25 0 0 1 4.25-3.5h4.25z"></path>
            <path d="M6.5 8h2.25"></path>
            <path d="M15.25 8h2.25"></path>
        </symbol>
        <symbol id="media-icon-audio-books" viewBox="0 0 24 24">
            <path d="M4 14v-2a8 8 0 0 1 16 0v2"></path>
            <rect x="3" y="13" width="4.5" height="7" rx="2.25"></rect>
            <rect x="16.5" y="13" width="4.5" height="7" rx="2.25"></rect>
            <path d="M9 10.5v2M12 8.5v6M15 10.5v2"></path>
        </symbol>
        <symbol id="media-icon-file" viewBox="0 0 24 24">
            <path d="M6 3.5h8l4 4v13H6z"></path>
            <path d="M14 3.5v4h4M9 12h6M9 16h6"></path>
        </symbol>
    </svg>

    <header>
        <div class="header-content">
            <h1>Top Charts</h1>
            <div class="controls">
                <button id="jsonListButton" class="json-list-button" type="button" disabled>JSON Files</button>
                <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme"></button>
                <select id="dateSelect">
                    <option value="" disabled selected>Source / Date</option>
                </select>
                <select id="countrySelect">
                    <option value="" disabled selected>Region</option>
                </select>
                <select id="mediaTypeSelect">
                    <option value="" disabled selected>Media Type</option>
                </select>
                <select id="feedSelect">
                    <option value="" disabled selected>Category</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <div id="appGrid" class="app-list">
            <div class="loading">Select options to view rankings</div>
        </div>
    </main>

    <!-- App Detail Modal -->
    <div id="appModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js?v=20260720-7"></script>
</body>
</html>
