<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Top Charts</h1>
            <div class="controls">
                <a id="jsonLink" href="#" target="_blank" style="display: none; margin-right: 10px;">View JSON</a>
                <select id="dateSelect">
                    <option value="" disabled selected>Date</option>
                </select>
                <select id="countrySelect">
                    <option value="" disabled selected>Region</option>
                </select>
                <select id="mediaTypeSelect">
                    <option value="" disabled selected>Media Type</option>
                </select>
                <select id="feedSelect">
                    <option value="" disabled selected>Category</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <div id="appGrid" class="app-list">
            <div class="loading">Select options to view rankings</div>
        </div>
    </main>

    <!-- App Detail Modal -->
    <div id="appModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</body>
</html>
