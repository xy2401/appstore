<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>App Store Rankings</title>
    <script>
        (() => {
            let theme = null;
            try {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light' || savedTheme === 'dark') theme = savedTheme;
            } catch {
                // Storage can be unavailable in privacy-restricted contexts.
            }
            document.documentElement.dataset.theme = theme
                || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        })();
    </script>
    <link rel="stylesheet" href="style.css?v=20260720-3">
</head>
<body>
    <svg class="svg-sprite" aria-hidden="true" focusable="false">
        <symbol id="media-icon-apps" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="2"></rect>
            <rect x="14" y="3" width="7" height="7" rx="2"></rect>
            <rect x="3" y="14" width="7" height="7" rx="2"></rect>
            <rect x="14" y="14" width="7" height="7" rx="2"></rect>
        </symbol>
        <symbol id="media-icon-music" viewBox="0 0 24 24">
            <path d="M9 18V5l11-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="17" cy="16" r="3"></circle>
        </symbol>
        <symbol id="media-icon-podcasts" viewBox="0 0 24 24">
            <circle cx="12" cy="11" r="2.5"></circle>
            <path d="M8.5 16.5a6 6 0 1 1 7 0"></path>
            <path d="M6 19a10 10 0 1 1 12 0"></path>
            <path d="M10 15h4l1 6h-6z"></path>
        </symbol>
        <symbol id="media-icon-books" viewBox="0 0 24 24">
            <path d="M3 5.5A3.5 3.5 0 0 1 6.5 2H11v18H6.5A3.5 3.5 0 0 0 3 23z"></path>
            <path d="M21 5.5A3.5 3.5 0 0 0 17.5 2H13v18h4.5A3.5 3.5 0 0 1 21 23z"></path>
        </symbol>
        <symbol id="media-icon-audio-books" viewBox="0 0 24 24">
            <path d="M4 15v-3a8 8 0 0 1 16 0v3"></path>
            <path d="M4 15a3 3 0 0 1 3-3h1v8H7a3 3 0 0 1-3-3z"></path>
            <path d="M20 15a3 3 0 0 0-3-3h-1v8h1a3 3 0 0 0 3-3z"></path>
        </symbol>
        <symbol id="media-icon-file" viewBox="0 0 24 24">
            <path d="M7 3h7l4 4v14H7z"></path>
            <path d="M14 3v5h5"></path>
        </symbol>
    </svg>

    <header>
        <div class="header-content">
            <h1>Top Charts</h1>
            <div class="controls">
                <button id="jsonListButton" class="json-list-button" type="button" disabled>JSON Files</button>
                <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme"></button>
                <select id="dateSelect">
                    <option value="" disabled selected>Date</option>
                </select>
                <select id="countrySelect">
                    <option value="" disabled selected>Region</option>
                </select>
                <select id="mediaTypeSelect">
                    <option value="" disabled selected>Media Type</option>
                </select>
                <select id="feedSelect">
                    <option value="" disabled selected>Category</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <div id="appGrid" class="app-list">
            <div class="loading">Select options to view rankings</div>
        </div>
    </main>

    <!-- App Detail Modal -->
    <div id="appModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <script src="script.js?v=20260720-3"></script>
</body>
</html>
